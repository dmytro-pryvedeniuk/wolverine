name: rabbitmq

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  config: Release
  disable_test_parallelization: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [CIRabbitMQ, CIRabbitMQCircuitBreaking]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run RabbitMQ Tests
        run: ./build.sh ${{ matrix.target }} --framework net9.0

      - name: Stop containers
        if: always()
        run: docker compose down

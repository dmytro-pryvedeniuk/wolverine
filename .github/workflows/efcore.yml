name: efcore

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  config: Release
  disable_test_parallelization: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run EF Core Tests
        run: ./build.sh CIEfCore --framework net9.0

      - name: Upload TRX results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Stop containers
        if: always()
        run: docker compose down

  report:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download TRX results
        uses: actions/download-artifact@v8
        with:
          name: test-results

      - name: Install trx2junit converter
        run: dotnet tool install --global trx2junit

      - name: Convert all TRX to JUnit XML
        run: |
          mkdir -p junit-results
          # Find all .trx files under any TestResults folder and convert them
          find . -type f -path "*/TestResults/*.trx" -exec trx2junit {} \;
          # Move converted XMLs into junit-results for consistency
          find . -type f -name "*.xml" -exec mv {} junit-results/ \;

      # Inline reporting (per run)
      - name: Report test results
        uses: timkrins/github-actions-test-reporter-ctrf@v1
        with:
          report-files: "junit-results/*.xml"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append results with deduplication and retention
        run: |
          python .github/scripts/append_test_results.py \
            --input junit-results/*.xml \
            --output ./dashboard/results.json \
            --branch $GITHUB_REF_NAME \
            --run $GITHUB_RUN_ID \
            --limit 50

      - name: Generate dashboard
        run: |
          python scripts/report.py ./dashboard/results.json --output ./dashboard

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
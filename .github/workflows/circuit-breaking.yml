name: circuit-breaking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      repeat:
        description: 'Number of times to repeat tests'
        required: false
        default: 1
        type: number

env:
  config: Release
  disable_test_parallelization: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.count.outputs.count }}
      matrix: ${{ steps.count.outputs.matrix }}
    steps:
      - name: Determine repeat count
        id: count
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT=${{ github.event.inputs.repeat || 1 }}
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            LINE=$(echo '${{ github.event.pull_request.body }}' | grep '^x-repeat/' | head -1)
            if [ -n "$LINE" ]; then
              NAMES=$(echo "$LINE" | cut -d/ -f2)
              COUNT=$(echo "$LINE" | cut -d/ -f3)
              case ",$NAMES," in *",${{ github.workflow }},"*) ;; *) COUNT=1 ;; esac
            else
              COUNT=1
            fi
          else
            COUNT=1
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "matrix={\"run\":[$(seq -s ',' 1 $COUNT)]}" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    if: needs.setup.outputs.count == 1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps: &test-steps
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run CircuitBreaking Tests
        run: ./build.sh CICircuitBreaking --framework net9.0

      - name: Stop containers
        if: always()
        run: docker compose down

  test-matrix:
    needs: setup
    if: needs.setup.outputs.count != 1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps: *test-steps

name: marten

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  config: Release
  disable_test_parallelization: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run Marten Tests
        run: ./build.sh CIMarten --framework net9.0

      - name: Report results
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: xUnit Tests
          path: "**/TestResults/*.trx"
          reporter: dotnet-trx
          list-suites: "failed"
          list-tests: "failed"

      - name: Stop containers
        if: always()
        run: docker compose down
